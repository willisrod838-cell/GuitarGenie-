<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List - Local Storage App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 My Tasks</h1>
            <p class="subtitle">Stay organized with local storage</p>
        </div>

        <div class="input-section">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="Add a new task..." 
                class="todo-input"
            >
            <button id="addBtn" class="add-btn">Add Task</button>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <div class="stats">
            <span id="totalTasks">Total: 0</span>
            <span id="completedTasks">Completed: 0</span>
            <span id="activeTasks">Active: 0</span>
        </div>

        <ul id="todoList" class="todo-list"></ul>

        <div class="actions">
            <button id="clearCompleted" class="clear-btn">Clear Completed</button>
            <button id="clearAll" class="delete-btn">Delete All</button>
            <button id="exportBtn" class="export-btn">Export</button>
            <button id="importBtn" class="import-btn">Import</button>
            <input type="file" id="importFile" accept=".json" style="display:none">
        </div>

        <div id="emptyState" class="empty-state">
            <p>🎉 No tasks yet. Add one to get started!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
